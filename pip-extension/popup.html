<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      padding: 14px;
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h3 {
      font-size: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 7px 9px;
      border-radius: 5px;
      border: 1px solid #0f3460;
      background: #16213e;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
    }
    input[type="text"]:focus { border-color: #4a9eff; }
    button {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    #open-btn {
      background: #4a9eff;
      color: white;
      margin-bottom: 6px;
    }
    #open-btn:hover { background: #2980e4; }
    #toggle-btn {
      background: #2c2c4a;
      color: #aaa;
    }
    #toggle-btn:hover { background: #3a3a5c; color: white; }
    .hint {
      font-size: 10px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>🪟 PiP Overlay</h3>
  <input type="text" id="url-input" placeholder="https://…" />
  <button id="open-btn">오버레이 열기</button>
  <button id="toggle-btn">오버레이 숨기기 / 보이기</button>
  <p class="hint">URL 없이 열면 빈 브라우저로 시작합니다.</p>
  <script src="popup.js"></script>
</body>
</html>
